<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping List</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #2ecc71;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
            --border: #ddd;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            position: relative;
        }

        h1 { text-align: center; margin-bottom: 20px; font-size: 1.5rem; color: var(--primary); }
        
        /* Input area */
        .input-group {
            position: sticky;
            top: 0;
            background: white;
            padding-bottom: 15px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            font-size: 16px; /* Prevents iOS zoom */
        }

        input[type="text"]:focus { border-color: var(--primary); }

        button#add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Dropdown Suggestions */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 200;
            margin-top: 5px;
        }

        .suggestion-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover { background: #f8f9fa; }

        .tag {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tag-buy { background: #e3f2fd; color: #1976d2; }
        .tag-bought { background: #e8f5e9; color: #2e7d32; }

        /* Lists Styles */
        .list-section h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 5px;
            margin: 20px 0 10px 0;
        }

        ul { list-style: none; padding: 0; margin: 0; }

        li {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
        }

        .item-text { flex: 1; margin-left: 12px; cursor: pointer; }

        .bought-item .item-text {
            text-decoration: line-through;
            color: #aaa;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0 5px;
        }

        .delete-btn:hover { color: #ff5252; }

        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Groceries</h1>
    
    <div class="input-group">
        <div class="input-wrapper">
            <input type="text" id="item-input" placeholder="Type to search or add..." autocomplete="off">
            <div id="suggestions" class="suggestions"></div>
        </div>
        <button id="add-btn">Add</button>
    </div>

    <div class="list-section">
        <h2 id="to-buy-count">To Buy (0)</h2>
        <ul id="to-buy-list"></ul>
    </div>

    <div class="list-section">
        <h2 id="bought-count">Bought (0)</h2>
        <ul id="bought-list"></ul>
    </div>
</div>

<script>
    const itemInput = document.getElementById('item-input');
    const addBtn = document.getElementById('add-btn');
    const suggestionsBox = document.getElementById('suggestions');
    const toBuyList = document.getElementById('to-buy-list');
    const boughtList = document.getElementById('bought-list');

    let items = JSON.parse(localStorage.getItem('shoppingList')) || [];

    function save() {
        localStorage.setItem('shoppingList', JSON.stringify(items));
        render();
    }

    function addItem() {
        const text = itemInput.value.trim();
        if (!text) return;

        // Check if it already exists
        const existing = items.find(i => i.text.toLowerCase() === text.toLowerCase());
        if (existing) {
            handleSuggestionClick(existing);
            return;
        }

        items.push({
            id: Date.now(),
            text: text,
            status: 'toBuy',
            timestamp: Date.now()
        });

        itemInput.value = '';
        suggestionsBox.style.display = 'none';
        save();
    }

    function handleSuggestionClick(item) {
        // If it's in the bought list, move it back to toBuy
        if (item.status === 'bought') {
            item.status = 'toBuy';
            item.timestamp = Date.now(); // Put at bottom of To Buy
        }
        
        itemInput.value = '';
        suggestionsBox.style.display = 'none';
        save();
    }

    function toggleItem(id) {
        items = items.map(item => {
            if (item.id === id) {
                return { 
                    ...item, 
                    status: item.status === 'toBuy' ? 'bought' : 'toBuy', 
                    timestamp: Date.now() 
                };
            }
            return item;
        });
        save();
    }

    function deleteItem(id) {
        items = items.filter(item => item.id !== id);
        save();
    }

    function updateSuggestions() {
        const query = itemInput.value.toLowerCase();
        suggestionsBox.innerHTML = '';

        if (!query) {
            suggestionsBox.style.display = 'none';
            return;
        }

        const matches = items.filter(i => i.text.toLowerCase().includes(query));

        if (matches.length > 0) {
            matches.forEach(item => {
                const div = document.createElement('div');
                div.className = 'suggestion-item';
                
                const label = item.status === 'toBuy' ? 'To Buy' : 'In Bought';
                const tagClass = item.status === 'toBuy' ? 'tag-buy' : 'tag-bought';

                div.innerHTML = `
                    <span>${item.text}</span>
                    <span class="tag ${tagClass}">${label}</span>
                `;
                
                div.onclick = () => handleSuggestionClick(item);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            suggestionsBox.style.display = 'none';
        }
    }

    function render() {
        toBuyList.innerHTML = '';
        boughtList.innerHTML = '';

        // Sort To Buy: Ascending (Oldest first)
        const toBuyItems = items
            .filter(i => i.status === 'toBuy')
            .sort((a, b) => a.timestamp - b.timestamp);

        // Sort Bought: Descending (Newest first)
        const boughtItems = items
            .filter(i => i.status === 'bought')
            .sort((a, b) => b.timestamp - a.timestamp);

        toBuyItems.forEach(item => toBuyList.appendChild(createItemEl(item)));
        boughtItems.forEach(item => boughtList.appendChild(createItemEl(item)));

        document.getElementById('to-buy-count').textContent = `To Buy (${toBuyItems.length})`;
        document.getElementById('bought-count').textContent = `Bought (${boughtItems.length})`;
    }

    function createItemEl(item) {
        const li = document.createElement('li');
        if (item.status === 'bought') li.className = 'bought-item';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = (item.status === 'bought');
        checkbox.onchange = () => toggleItem(item.id);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;
        span.onclick = () => toggleItem(item.id);

        const delBtn = document.createElement('button');
        delBtn.className = 'delete-btn';
        delBtn.innerHTML = '&times;';
        delBtn.onclick = (e) => {
            e.stopPropagation();
            deleteItem(item.id);
        };

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(delBtn);
        return li;
    }

    // Event Listeners
    itemInput.addEventListener('input', updateSuggestions);
    addBtn.onclick = addItem;
    itemInput.onkeypress = (e) => { if (e.key === 'Enter') addItem(); };

    // Close dropdown if clicking outside
    document.addEventListener('click', (e) => {
        if (!e.target.closest('.input-wrapper')) {
            suggestionsBox.style.display = 'none';
        }
    });

    render();
</script>

</body>
</html>
